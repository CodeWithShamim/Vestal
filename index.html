<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Apply the saved theme before first paint to avoid a flash. Default: dark.
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('vestal-theme') === 'light' ? 'light' : 'dark';
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>
    <title>Vestal — Launch terms are physics, not promises.</title>
    <meta
      name="description"
      content="Vestal is a token launchpad on Ritual Chain where every launch is enforced by a sovereign AI guardian that holds its own keys and cannot be shut down."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 3c3 5-4 7-1 12 1.6 2.7 5 2.4 6-1 4 6-1 15-5 15S7 24 9 17c1.5-5.2 6-7 7-14z' fill='%23FF6B2C'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;450;500;600;700&display=swap"
      rel="stylesheet"
    />

  </body>
</html>
